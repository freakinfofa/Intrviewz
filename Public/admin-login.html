<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – Assessment Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="body-centered"
    style="background-image: radial-gradient(ellipse 80% 60% at 20% 10%, rgba(245, 158, 11, .10) 0%, transparent 60%), radial-gradient(ellipse 60% 50% at 80% 90%, rgba(249, 115, 22, .08) 0%, transparent 60%);">
    <div class="container">
        <div class="logo">
            <img src="images/logo.png" alt="Assessment Portal Logo" class="brand-logo" />
            <h1>Admin Access</h1>
            <p>Assessment Portal</p>
            <span class="admin-badge">Restricted</span>
        </div>

        <div class="card">
            <div id="alertBox" class="alert"></div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" placeholder="admin@company.com" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn" id="loginBtn">Sign In as Admin</button>
            </form>
        </div>
        <a class="back-link" href="index.html">← Back to Candidate Login</a>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Already logged in as admin?
        if (sessionStorage.getItem('adminToken')) {
            window.location.href = 'admin.html';
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideAlert();
            setLoading('loginBtn', true, 'Sign In as Admin');

            try {
                const res = await fetch(`${API}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                sessionStorage.setItem('adminToken', data.token);
                window.location.href = 'admin.html';
            } catch (err) {
                showAlert(err.message);
                setLoading('loginBtn', false, 'Sign In as Admin');
            }
        }
    </script>
</body>

</html>
