<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment – Intrviewz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=Space+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        body {
            font-size: var(--text-base);
        }

        /* ── Progress Bar (Top) ── */
        .progress-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }

        .progress-track {
            height: 4px;
            background: var(--border);
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width var(--transition-slow);
        }

        /* ── Top Bar ── */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-5);
            background: var(--surface);
            border-bottom: 1px solid var(--border);
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: var(--space-4);
        }

        .back-link {
            font-family: var(--font-display);
            font-size: var(--text-xs);
            font-weight: 500;
            color: var(--text-tertiary);
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--text);
        }

        .module-title {
            font-family: var(--font-display);
            font-size: var(--text-sm);
            font-weight: 600;
        }

        .candidate-info {
            font-family: var(--font-display);
            font-size: var(--text-sm);
            color: var(--text-tertiary);
        }

        .candidate-info span {
            color: var(--text);
            font-weight: 500;
        }

        /* ── Main Layout ── */
        .quiz-layout {
            min-height: calc(100vh - 65px);
            margin-top: 65px;
        }

        .quiz-main {
            max-width: 700px;
            margin: 0 auto;
            padding: var(--space-8) var(--space-6);
        }

        /* ── Question ── */
        .question-counter {
            font-family: var(--font-display);
            font-size: var(--text-sm);
            color: var(--text-tertiary);
            margin-bottom: var(--space-6);
        }

        .question-text {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: var(--space-6);
        }

        /* ── Options ── */
        .options {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .option {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-4);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            cursor: pointer;
            transition: border-color var(--transition-fast);
            user-select: none;
        }

        .option:hover {
            border-color: var(--accent);
        }

        .option.selected {
            border-color: var(--accent);
            background: var(--accent-alpha);
        }

        .option-radio {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border);
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option.selected .option-radio {
            border-color: var(--accent);
            background: var(--accent);
        }

        .option-radio::after {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: white;
            opacity: 0;
        }

        .option.selected .option-radio::after {
            opacity: 1;
        }

        .option-label {
            font-size: var(--text-base);
            line-height: 1.5;
        }

        /* ── Open-ended Input ── */
        .open-ended-input {
            width: 100%;
            font-family: var(--font-body);
            font-size: var(--text-base);
            line-height: 1.7;
            padding: var(--space-6);
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            resize: vertical;
            min-height: 200px;
            outline: none;
            transition: all var(--transition-fast);
        }

        .open-ended-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-alpha);
        }

        .open-ended-input::placeholder {
            color: var(--text-muted);
        }

        /* ── Navigation ── */
        .quiz-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: var(--space-6);
            padding-top: var(--space-5);
            border-top: 1px solid var(--border);
        }

        .quiz-nav .btn {
            padding: var(--space-3) var(--space-5);
        }
            border-color: var(--text);
            color: var(--text);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── Question Navigator (Simplified) ── */
        .quiz-sidebar {
            display: none;
        }
            background: var(--surface);
            border-color: var(--text);
            color: var(--text);
        }

        /* ── Submit Section ── */
        .submit-section {
            display: none;
            text-align: center;
            padding: var(--space-10) 0;
        }

        .submit-section.visible {
            display: block;
            animation: fadeIn var(--transition);
        }

        .submit-note {
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--text-secondary);
            margin-bottom: var(--space-6);
        }

        /* ── Loading & Saving States ── */
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 65px);
            gap: var(--space-5);
            color: var(--text-tertiary);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .saving-overlay {
            position: fixed;
            inset: 0;
            background: color-mix(in oklab, var(--bg) 95%, transparent);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: var(--space-4);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
        }

        .saving-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: var(--space-6);
            right: var(--space-6);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-3) var(--space-5);
            font-family: var(--font-display);
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--success);
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(10px);
            transition: all var(--transition);
            z-index: 150;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            .top-bar {
                padding: var(--space-3) var(--space-4);
            }

            .module-title {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Progress Bar -->
    <div class="progress-header">
        <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
        </div>
    </div>

    <!-- Top Bar -->
    <div class="top-bar">
        <div class="top-bar-left">
            <a href="dashboard.html" class="back-link">← Back</a>
            <span class="module-title" id="moduleTitle">Assessment</span>
        </div>
        <div class="candidate-info">
            Candidate: <span id="candidateTag">—</span>
        </div>
    </div>

    <!-- Main Layout -->
    <div class="quiz-layout">
        <div class="quiz-main">
            <!-- Loading State -->
            <div id="loadingState" class="loading-state">
                <div class="spinner"></div>
                <p>Loading questions...</p>
            </div>

            <!-- Quiz Content -->
            <div id="quizContent" style="display: none;">
                <div class="question-container">
                    <div class="question-counter">
                        Question <span id="qNum">1</span> of <span id="qTotal">—</span>
                    </div>
                    <div class="question-text" id="questionText"></div>
                    <div class="options" id="optionsContainer"></div>
                </div>

                <div class="quiz-nav">
                    <button class="btn btn-secondary" id="prevBtn" onclick="navigate(-1)">
                        ← Previous
                    </button>
                    <button class="btn btn-secondary" id="nextBtn" onclick="navigate(1)">
                        Next →
                    </button>
                </div>

                <div class="submit-section" id="submitSection">
                    <p class="submit-note">You've reached the last question. Ready to submit?</p>
                    <button class="btn btn-primary" onclick="submitQuiz()">
                        Submit Assessment
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Saving Overlay -->
    <div class="saving-overlay" id="savingOverlay">
        <div class="spinner"></div>
        <p id="savingMsg">Saving your results...</p>
    </div>

    <script>
        const API = '/api';
        const candidateId = sessionStorage.getItem('candidateId') || 'guest';
        const candidateName = sessionStorage.getItem('candidateName') || 'Candidate';

        if (!candidateId || candidateId === 'guest') {
            window.location.href = 'index.html';
        }

        const params = new URLSearchParams(window.location.search);
        const MODULE_ID = params.get('module');

        if (!MODULE_ID) {
            document.getElementById('loadingState').innerHTML = `
                <p style="color: var(--danger)">No module specified. 
                <a href="dashboard.html" style="color: var(--accent)">Go back</a>.</p>
            `;
        }

        let MODULE_NAME = MODULE_ID;
        const SAVE_KEY = `progress_${candidateId}_${MODULE_ID}`;
        let questions = [];
        let userAnswers = [];
        let current = 0;
        let saveTimer = null;

        async function init() {
            if (!MODULE_ID) return;
            
            try {
                const res = await fetch(`${API}/questions/${MODULE_ID}`, {
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!res.ok) {
                    window.location.href = 'index.html';
                    return;
                }
                
                questions = await res.json();

                if (!questions.length) {
                    document.getElementById('loadingState').innerHTML = `
                        <p>This module has no questions yet.</p>
                    `;
                    return;
                }

                // Get module name
                try {
                    const mr = await fetch(`${API}/modules`, { 
                        headers: { 'Content-Type': 'application/json' } 
                    });
                    const mods = await mr.json();
                    const mod = mods.find(m => m.id === MODULE_ID);
                    if (mod) {
                        MODULE_NAME = mod.name;
                        document.getElementById('moduleTitle').textContent = MODULE_NAME;
                        document.title = `${MODULE_NAME} – Intrviewz`;
                    }
                } catch { }

                userAnswers = new Array(questions.length).fill(null);

                // Restore saved progress
                try {
                    const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
                    if (saved && Array.isArray(saved) && saved.length === questions.length) {
                        userAnswers = saved;
                    }
                } catch { }

                document.getElementById('candidateTag').textContent = candidateName;
                document.getElementById('qTotal').textContent = questions.length;
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('quizContent').style.display = 'block';

                buildDots();
                renderQuestion(0);
            } catch {
                document.getElementById('loadingState').innerHTML = `
                    <p>Failed to load questions. Please 
                    <a href="dashboard.html" style="color: var(--accent)">go back</a> 
                    and try again.</p>
                `;
            }
        }

        function saveProgress() {
            try {
                localStorage.setItem(SAVE_KEY, JSON.stringify(userAnswers));
            } catch { }
        }

        function showToast() {
            let toast = document.getElementById('savedToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'savedToast';
                toast.className = 'toast';
                toast.textContent = 'Progress saved';
                document.body.appendChild(toast);
            }
            
            toast.classList.add('show');
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => {
                toast.classList.remove('show');
            }, 1500);
        }

        function updateProgress() {
            const percentage = ((current + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }

        function renderQuestion(idx) {
            current = idx;
            const q = questions[idx];
            
            document.getElementById('qNum').textContent = idx + 1;
            document.getElementById('questionText').textContent = `Q${idx + 1}. ${q.question || q.q}`;
            
            updateProgress();

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            
            const isOpenEnded = q.question_type === 'open_ended';
            
            if (isOpenEnded) {
                const textarea = document.createElement('textarea');
                textarea.className = 'open-ended-input';
                textarea.placeholder = 'Enter your answer here...';
                textarea.value = userAnswers[idx] || '';
                
                const autoSave = () => {
                    userAnswers[idx] = textarea.value.trim() || null;
                    saveProgress();
                    updateDots();
                };
                
                textarea.addEventListener('input', () => {
                    clearTimeout(saveTimer);
                    saveTimer = setTimeout(autoSave, 500);
                });
                
                textarea.addEventListener('blur', autoSave);
                container.appendChild(textarea);
                
                setTimeout(() => textarea.focus(), 50);
            } else {
                const opts = q.opts || [q.opt0, q.opt1, q.opt2, q.opt3].filter(Boolean);
                
                opts.forEach((opt, i) => {
                    const option = document.createElement('div');
                    option.className = 'option' + (userAnswers[idx] === i ? ' selected' : '');
                    option.innerHTML = `
                        <div class="option-radio"></div>
                        <span class="option-label">${opt}</span>
                    `;
                    
                    option.addEventListener('click', () => {
                        userAnswers[idx] = i;
                        saveProgress();
                        showToast();
                        renderQuestion(idx);
                    });
                    
                    container.appendChild(option);
                });
            }

            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx === questions.length - 1;
            
            const submitSection = document.getElementById('submitSection');
            if (idx === questions.length - 1) {
                submitSection.classList.add('visible');
            } else {
                submitSection.classList.remove('visible');
            }
            
            updateDots();
        }

        function navigate(dir) {
            const next = current + dir;
            if (next >= 0 && next < questions.length) {
                renderQuestion(next);
            }
        }

        function buildDots() {
            const container = document.getElementById('dotsContainer');
            container.innerHTML = '';
            
            questions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot';
                dot.textContent = i + 1;
                dot.title = `Question ${i + 1}`;
                dot.onclick = () => renderQuestion(i);
                container.appendChild(dot);
            });
        }

        function updateDots() {
            questions.forEach((_, i) => {
                const dot = document.getElementById('dotsContainer').children[i];
                dot.className = 'dot';
                if (userAnswers[i] !== null) dot.classList.add('answered');
                if (i === current) dot.classList.add('current');
            });
        }

        async function submitQuiz() {
            const unanswered = userAnswers.filter(a => a === null).length;
            
            if (unanswered > 0) {
                if (!confirm(`${unanswered} question(s) unanswered. Submit anyway?`)) return;
            }

            document.getElementById('savingOverlay').classList.add('show');

            const answers = questions.map((q, i) => {
                const isOpenEnded = q.question_type === 'open_ended';
                const opts = q.opts || [q.opt0, q.opt1, q.opt2, q.opt3].filter(Boolean);
                
                return {
                    question_index: i,
                    chosen_option: userAnswers[i] !== null 
                        ? (isOpenEnded ? userAnswers[i] : opts[userAnswers[i]]) 
                        : null,
                    is_open_ended: isOpenEnded
                };
            });

            try {
                const res = await fetch(`${API}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        moduleId: MODULE_ID, 
                        moduleName: MODULE_NAME, 
                        answers 
                    })
                });
                
                if (!res.ok) throw new Error('Server error');
                
                localStorage.removeItem(SAVE_KEY);
                document.getElementById('savingMsg').textContent = 'Assessment submitted! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1200);
            } catch {
                document.getElementById('savingOverlay').classList.remove('show');
                alert('Failed to submit. Please try again.');
            }
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && current > 0) navigate(-1);
            if (e.key === 'ArrowRight' && current < questions.length - 1) navigate(1);
        });

        init();
    </script>
</body>
</html>
