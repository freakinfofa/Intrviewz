<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assessment – Assessment Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3350;
            --accent: #4f8ef7;
            --accent2: #7c5cfc;
            --success: #22c55e;
            --danger: #ef4444;
            --text: #e8eaf6;
            --muted: #8b90b0;
            --radius: 14px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background-image:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79, 142, 247, .12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 90%, rgba(124, 92, 252, .10) 0%, transparent 60%);
        }

        .screen {
            display: none;
            width: 100%;
            max-width: 760px;
            animation: fadeIn .35s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px 48px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, .45);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            font-size: .82rem;
            text-decoration: none;
            margin-bottom: 24px;
            transition: color .2s;
        }

        .back-link:hover {
            color: var(--text);
        }

        .quiz-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .q-counter {
            font-size: .85rem;
            color: var(--muted);
            font-weight: 500;
        }

        .q-counter span {
            color: var(--text);
            font-weight: 700;
        }

        .candidate-tag {
            font-size: .82rem;
            color: var(--muted);
        }

        .candidate-tag span {
            color: var(--accent);
            font-weight: 600;
        }

        .progress-track {
            height: 4px;
            background: var(--surface2);
            border-radius: 4px;
            margin-bottom: 32px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 4px;
            transition: width .4s cubic-bezier(.4, 0, .2, 1);
        }

        .question-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 20px;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            cursor: pointer;
            transition: all .18s;
            user-select: none;
        }

        .option:hover {
            border-color: var(--accent);
            background: rgba(79, 142, 247, .07);
        }

        .option.selected {
            border-color: var(--accent);
            background: rgba(79, 142, 247, .13);
        }

        .option-radio {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .18s;
        }

        .option.selected .option-radio {
            border-color: var(--accent);
            background: var(--accent);
        }

        .option-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #fff;
            opacity: 0;
            transition: opacity .15s;
        }

        .option.selected .option-radio::after {
            opacity: 1;
        }

        .option-label {
            font-size: .97rem;
        }

        .quiz-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 32px;
        }

        .dots {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            justify-content: center;
            flex: 1;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border);
            cursor: pointer;
            transition: all .2s;
        }

        .dot.current {
            background: var(--accent);
            transform: scale(1.3);
        }

        .dot.answered {
            background: var(--muted);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            border-radius: 10px;
            font-size: .95rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all .2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            box-shadow: 0 4px 18px rgba(79, 142, 247, .35);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(79, 142, 247, .5);
        }

        .btn-primary:disabled {
            opacity: .45;
            cursor: not-allowed;
            transform: none;
        }

        .btn-ghost {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--border);
        }

        .btn-ghost:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            font-size: 1.1rem;
        }

        .saving-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 17, 23, .85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }

        .saving-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .saving-overlay .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        .loading-state {
            text-align: center;
            padding: 60px 0;
            color: var(--muted);
        }

        .loading-state .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .card {
                padding: 28px 20px 24px;
            }
        }
    </style>
</head>

<body>

    <div class="saving-overlay" id="savingOverlay">
        <div class="spinner"></div>
        <p id="savingMsg">Saving your results…</p>
    </div>

    <div id="quiz" class="screen active">
        <div class="card">
            <a class="back-link" href="dashboard.html">← Back to Dashboard</a>

            <div id="loadingState" class="loading-state">
                <div class="spinner"></div>
                <p>Loading questions…</p>
            </div>

            <div id="quizContent" style="display:none;">
                <div class="quiz-header">
                    <div class="q-counter">Question <span id="qNum">1</span> of <span id="qTotal">—</span></div>
                    <div class="candidate-tag">Candidate: <span id="candidateTag">—</span></div>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" id="progressFill" style="width:5%;"></div>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="quiz-nav">
                    <button class="btn btn-icon btn-ghost" id="prevBtn" onclick="navigate(-1)">&#8592;</button>
                    <div class="dots" id="dotsContainer"></div>
                    <button class="btn btn-icon btn-ghost" id="nextBtn" onclick="navigate(1)">&#8594;</button>
                </div>
                <div style="text-align:center; margin-top:28px;">
                    <button class="btn btn-primary" id="submitBtn" onclick="submitQuiz()" style="display:none;">Submit
                        Test ✓</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = '/api';
        const token = sessionStorage.getItem('token');
        const candidateId = sessionStorage.getItem('candidateId') || 'guest';
        const candidateName = sessionStorage.getItem('candidateName') || 'Candidate';

        if (!token) window.location.href = 'index.html';

        // Read module ID from ?module=<id> query param
        const params = new URLSearchParams(window.location.search);
        const MODULE_ID = params.get('module');

        if (!MODULE_ID) {
            document.getElementById('loadingState').innerHTML =
                '<p style="color:var(--danger)">No module specified. <a href="dashboard.html" style="color:var(--accent)">Go back</a>.</p>';
        }

        let MODULE_NAME = MODULE_ID; // will be updated from API if available
        const SAVE_KEY = `progress_${candidateId}_${MODULE_ID}`;

        let questions = [];
        let userAnswers = [];
        let current = 0;
        let saveTimer = null;

        async function init() {
            if (!MODULE_ID) return;
            try {
                // Fetch questions for this module
                const res = await fetch(`${API}/questions/${MODULE_ID}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Failed to load');
                questions = await res.json();

                if (!questions.length) {
                    document.getElementById('loadingState').innerHTML =
                        '<p style="color:var(--danger)">This module has no questions yet.</p>';
                    return;
                }

                // Try to get the module name from the modules list
                try {
                    const mr = await fetch(`${API}/modules`, { headers: { 'Authorization': `Bearer ${token}` } });
                    const mods = await mr.json();
                    const mod = mods.find(m => m.id === MODULE_ID);
                    if (mod) {
                        MODULE_NAME = mod.name;
                        document.title = `${MODULE_NAME} – Assessment Portal`;
                    }
                } catch { /* non-fatal */ }

                userAnswers = new Array(questions.length).fill(null);

                // Restore saved progress
                try {
                    const saved = JSON.parse(localStorage.getItem(SAVE_KEY));
                    if (saved && Array.isArray(saved) && saved.length === questions.length) {
                        userAnswers = saved;
                    }
                } catch { /* ignore corrupt data */ }

                document.getElementById('candidateTag').textContent = candidateName;
                document.getElementById('qTotal').textContent = questions.length;
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('quizContent').style.display = 'block';

                buildDots();
                renderQuestion(0);
            } catch {
                document.getElementById('loadingState').innerHTML =
                    '<p style="color:var(--danger)">Failed to load questions. Please refresh or <a href="dashboard.html" style="color:var(--accent)">go back</a>.</p>';
            }
        }

        function saveProgress() {
            try { localStorage.setItem(SAVE_KEY, JSON.stringify(userAnswers)); } catch { }
        }

        function showSavedToast() {
            let toast = document.getElementById('savedToast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = 'savedToast';
                toast.style.cssText = 'position:fixed;bottom:24px;right:24px;background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3);border-radius:9px;padding:7px 16px;font-size:.8rem;font-weight:600;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;';
                toast.textContent = '✓ Progress saved';
                document.body.appendChild(toast);
            }
            toast.style.opacity = '1';
            clearTimeout(saveTimer);
            saveTimer = setTimeout(() => { toast.style.opacity = '0'; }, 1500);
        }

        function renderQuestion(idx) {
            current = idx;
            const q = questions[idx];
            document.getElementById('qNum').textContent = idx + 1;
            // questions from DB may be sent with `opts` array or `opt0...3` fields
            const opts = q.opts || [q.opt0, q.opt1, q.opt2, q.opt3].filter(Boolean);
            document.getElementById('questionText').textContent = `Q${idx + 1}. ${q.question || q.q}`;
            document.getElementById('progressFill').style.width =
                `${Math.round(((idx + 1) / questions.length) * 100)}%`;

            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            opts.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = 'option' + (userAnswers[idx] === i ? ' selected' : '');
                div.innerHTML = `<div class="option-radio"></div><span class="option-label">${opt}</span>`;
                div.addEventListener('click', () => {
                    userAnswers[idx] = i;
                    saveProgress();
                    showSavedToast();
                    renderQuestion(idx);
                });
                container.appendChild(div);
            });

            document.getElementById('prevBtn').disabled = idx === 0;
            document.getElementById('nextBtn').disabled = idx === questions.length - 1;
            document.getElementById('submitBtn').style.display =
                idx === questions.length - 1 ? 'inline-flex' : 'none';
            updateDots();
        }

        function navigate(dir) {
            const next = current + dir;
            if (next >= 0 && next < questions.length) renderQuestion(next);
        }

        function buildDots() {
            const container = document.getElementById('dotsContainer');
            container.innerHTML = '';
            questions.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'dot'; dot.id = `dot-${i}`; dot.title = `Q${i + 1}`;
                dot.addEventListener('click', () => renderQuestion(i));
                container.appendChild(dot);
            });
        }

        function updateDots() {
            questions.forEach((_, i) => {
                const dot = document.getElementById(`dot-${i}`);
                dot.className = 'dot';
                if (userAnswers[i] !== null) dot.classList.add('answered');
                if (i === current) dot.classList.add('current');
            });
        }

        async function submitQuiz() {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0 && !confirm(`${unanswered} question(s) unanswered. Submit anyway?`)) return;

            document.getElementById('savingOverlay').classList.add('show');

            // Map answers to the format /api/submit expects
            const answers = questions.map((q, i) => {
                const opts = q.opts || [q.opt0, q.opt1, q.opt2, q.opt3].filter(Boolean);
                return {
                    question_index: i,
                    chosen_option: userAnswers[i] !== null ? opts[userAnswers[i]] : null
                };
            });

            try {
                const res = await fetch(`${API}/submit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ moduleId: MODULE_ID, moduleName: MODULE_NAME, answers })
                });
                if (!res.ok) throw new Error('Server error');
                localStorage.removeItem(SAVE_KEY);
                document.getElementById('savingMsg').textContent = 'Results saved! Redirecting…';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            } catch {
                document.getElementById('savingOverlay').classList.remove('show');
                alert('Failed to save results. Please try again.');
            }
        }

        init();
    </script>
</body>

</html>
