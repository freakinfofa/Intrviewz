<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – Intrviewz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=Space+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
        /* ── Dashboard Layout ── */
        .dashboard-content {
            animation: fadeIn 400ms ease;
        }

        /* ── Welcome Section ── */
        .welcome-section {
            margin-bottom: var(--space-10);
        }

        .welcome-section h1 {
            font-size: var(--text-3xl);
            margin-bottom: var(--space-2);
        }

        .welcome-section p {
            font-size: var(--text-lg);
            color: var(--text-secondary);
            margin-bottom: 0;
        }

        /* ── Progress Overview ── */
        .progress-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-4);
            margin-bottom: var(--space-10);
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-5);
        }

        .stat-card .stat-value {
            font-family: var(--font-display);
            font-size: var(--text-2xl);
            font-weight: 700;
            color: var(--text);
            margin-bottom: var(--space-1);
        }

        .stat-card .stat-label {
            font-family: var(--font-display);
            font-size: var(--text-xs);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
        }

        .stat-card.accent {
            background: var(--accent);
            border-color: var(--accent);
        }

        .stat-card.accent .stat-value,
        .stat-card.accent .stat-label {
            color: white;
        }

        /* ── Continue Section ── */
        .continue-section {
            margin-bottom: var(--space-10);
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-5);
        }

        .section-header h2 {
            font-size: var(--text-xl);
            margin-bottom: 0;
        }

        .continue-card {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: var(--space-6);
            align-items: center;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-5);
        }

        .continue-info h3 {
            font-size: var(--text-xl);
            margin-bottom: var(--space-2);
        }

        .continue-info p {
            color: var(--text-secondary);
            margin-bottom: var(--space-3);
        }

        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: var(--radius-sm);
            overflow: hidden;
            margin-bottom: var(--space-2);
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width var(--transition-slow);
        }

        .progress-text {
            font-family: var(--font-display);
            font-size: var(--text-xs);
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* ── Modules Section ── */
        .modules-section {
            margin-bottom: var(--space-10);
        }

        .modules-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-4);
        }

        .module-card {
            display: flex;
            flex-direction: column;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-5);
            text-decoration: none;
            color: inherit;
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .module-card:hover:not(.disabled) {
            border-color: var(--accent);
        }

        .module-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .module-card.coming-soon {
            background: var(--surface-elevated);
        }

        .module-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: var(--space-4);
        }

        .module-icon {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1.5rem;
        }

        .module-title {
            font-size: var(--text-lg);
            font-weight: 600;
            margin-bottom: var(--space-2);
        }

        .module-desc {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin-bottom: var(--space-4);
            flex: 1;
        }

        .module-meta {
            display: flex;
            gap: var(--space-2);
            flex-wrap: wrap;
            padding-top: var(--space-4);
            border-top: 1px solid var(--border);
        }

        /* ── Results Section ── */
        .results-section {
            margin-bottom: var(--space-8);
        }

        .results-table-wrap {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .results-empty {
            padding: var(--space-10);
            text-align: center;
            color: var(--text-tertiary);
        }

        .results-empty img {
            width: 120px;
            height: 120px;
            opacity: 0.5;
            margin-bottom: var(--space-4);
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: var(--space-10);
            color: var(--text-tertiary);
        }

        .empty-state img {
            width: 160px;
            height: 160px;
            opacity: 0.4;
            margin-bottom: var(--space-6);
        }

        .empty-state h3 {
            font-size: var(--text-xl);
            color: var(--text);
            margin-bottom: var(--space-2);
        }

        .empty-state p {
            max-width: 400px;
            margin: 0 auto;
        }

        /* ── Loading State ── */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            padding: var(--space-8);
            color: var(--text-tertiary);
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .continue-card {
                grid-template-columns: 1fr;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--space-3);
            }

            .modules-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <nav role="navigation" aria-label="Main navigation">
        <div class="nav-brand">
            <img src="images/logo.png" alt="Intrviewz" />
            Intrviewz
        </div>
        <div class="nav-right">
            <div class="nav-user">Welcome, <span id="navName">—</span></div>
            <button class="btn btn-secondary btn-sm" onclick="logout()" aria-label="Log out">Log Out</button>
        </div>
    </nav>

    <main class="dashboard-content" id="main-content">
        <!-- Welcome Section -->
        <section class="welcome-section">
            <h1>Dashboard</h1>
            <p>Track your progress and continue your assessments</p>
        </section>

        <!-- Stats Overview -->
        <div class="progress-overview" id="statsOverview">
            <div class="stat-card">
                <div class="stat-value" id="completedCount">—</div>
                <div class="stat-label">Completed</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="inProgressCount">—</div>
                <div class="stat-label">In Progress</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="availableCount">—</div>
                <div class="stat-label">Available</div>
            </div>
        </div>

        <!-- Continue Section -->
        <section class="continue-section" id="continueSection" style="display: none;">
            <div class="section-header">
                <h2>Continue Where You Left Off</h2>
            </div>
            <div class="continue-card" id="continueCard">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- Available Modules -->
        <section class="modules-section">
            <div class="section-header">
                <h2>Available Modules</h2>
            </div>
            <div class="modules-grid" id="modulesGrid">
                <div class="loading-state">
                    <span class="spinner"></span>
                    <span>Loading modules...</span>
                </div>
            </div>
        </section>

        <!-- Past Results -->
        <section class="results-section">
            <div class="section-header">
                <h2>Your Results</h2>
            </div>
            <div class="results-table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Module</th>
                            <th>Status</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr>
                            <td colspan="3" class="loading-state">
                                <span class="spinner"></span>
                                <span>Loading results...</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
    <script>
        const candidateId = sessionStorage.getItem('candidateId');
        const candidateName = sessionStorage.getItem('candidateName');

        if (!candidateId) window.location.href = 'index.html';

        document.getElementById('navName').textContent = candidateName || '—';

        // ── Load Modules ──
        async function loadModules(completedModules = new Set(), inProgressModules = new Set()) {
            try {
                const res = await fetch(`${API}/modules`, { headers: authHeaders() });
                const mods = await res.json();
                const grid = document.getElementById('modulesGrid');
                
                // Update stats
                const completed = Array.from(completedModules).length;
                const inProgress = Array.from(inProgressModules).length;
                const available = mods.filter(m => m.ready).length;
                
                document.getElementById('completedCount').textContent = completed;
                document.getElementById('inProgressCount').textContent = inProgress;
                document.getElementById('availableCount').textContent = available;

                grid.innerHTML = '';
                
                mods.forEach(m => {
                    const done = completedModules.has(m.id);
                    const inProg = inProgressModules.has(m.id);
                    const retakeOk = !!m.retakeGranted;
                    const locked = done && !retakeOk;
                    
                    const quizUrl = m.url ? m.url : `quiz.html?module=${encodeURIComponent(m.id)}`;
                    const isDiagram = (m.url || '').includes('diagram');
                    const moduleType = isDiagram ? 'Whiteboard' : 'Multiple Choice';
                    
                    const card = document.createElement(m.ready && !locked ? 'a' : 'div');
                    if (m.ready && !locked) {
                        card.href = quizUrl;
                    }
                    
                    card.className = 'module-card' + 
                        (!m.ready ? ' coming-soon disabled' : '') + 
                        (locked ? ' disabled' : '');
                    
                    let statusBadge = '';
                    if (done) {
                        statusBadge = `<span class="pill pill-success">Completed</span>`;
                    } else if (inProg) {
                        statusBadge = `<span class="pill pill-warning">In Progress</span>`;
                    } else if (retakeOk) {
                        statusBadge = `<span class="pill pill-accent">Retake Available</span>`;
                    } else if (!m.ready) {
                        statusBadge = `<span class="pill">Coming Soon</span>`;
                    }
                    
                    card.innerHTML = `
                        <div class="module-header">
                            <div class="module-icon">${m.icon}</div>
                            ${statusBadge}
                        </div>
                        <h3 class="module-title">${m.name}</h3>
                        <p class="module-desc">${m.desc}</p>
                        <div class="module-meta">
                            <span class="pill">${isDiagram ? 'Whiteboard' : m.questions + ' Questions'}</span>
                            <span class="pill">${moduleType}</span>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
            } catch {
                document.getElementById('modulesGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <p>Failed to load modules. Please refresh the page.</p>
                    </div>
                `;
            }
        }

        // ── Load Results ──
        async function loadResults() {
            const tbody = document.getElementById('resultsBody');
            const completedModules = new Set();
            const inProgressModules = new Set();
            
            try {
                // Fetch quiz results
                const res = await fetch(`${API}/results/${candidateId}`, { headers: authHeaders() });
                const results = await res.json();
                
                // Fetch diagram submissions
                let diagramSubs = [];
                try {
                    const dsRes = await fetch(`${API}/diagram/submissions/${candidateId}`, { headers: authHeaders() });
                    if (dsRes.ok) diagramSubs = await dsRes.json();
                } catch { }

                // Mark completed modules
                results.forEach(r => completedModules.add(r.module_id));
                diagramSubs.forEach(ds => completedModules.add(ds.module_id));
                
                // Check for in-progress modules
                const modulesRes = await fetch(`${API}/modules`, { headers: authHeaders() });
                const allMods = await modulesRes.json();
                
                let hasContinueCard = false;
                
                allMods.filter(m => m.ready).forEach(m => {
                    const progressKey = `progress_${candidateId}_${m.id}`;
                    const saved = localStorage.getItem(progressKey);
                    
                    if (saved && !completedModules.has(m.id)) {
                        try {
                            const progress = JSON.parse(saved);
                            if (Array.isArray(progress) && progress.some(a => a !== null)) {
                                inProgressModules.add(m.id);
                                
                                // Show continue card for first in-progress module
                                if (!hasContinueCard) {
                                    hasContinueCard = true;
                                    showContinueCard(m, progress);
                                }
                            }
                        } catch { }
                    }
                });
                
                // Load modules with completion data
                loadModules(completedModules, inProgressModules);
                
                // Render results table
                const hasAny = results.length > 0 || diagramSubs.length > 0;
                
                if (!hasAny) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="3">
                                <div class="results-empty">
                                    <img src="images/empty-state.png" alt="" />
                                    <p>No assessments completed yet. Select a module above to get started!</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }
                
                tbody.innerHTML = '';
                
                // Quiz results
                results.forEach(r => {
                    const date = new Date(r.submitted_at + 'Z').toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${r.module_name}</strong></td>
                        <td><span class="pill pill-success">Submitted</span></td>
                        <td style="color: var(--text-tertiary);">${date}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                // Diagram submissions
                diagramSubs.forEach(ds => {
                    const date = new Date(ds.submitted_at + 'Z').toLocaleDateString('en-US', {
                        month: 'short',
                        day: 'numeric',
                        year: 'numeric'
                    });
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${ds.module_name}</strong></td>
                        <td><span class="pill" style="background: var(--warning-bg); border-color: var(--warning); color: var(--warning);">Diagram Submitted</span></td>
                        <td style="color: var(--text-tertiary);">${date}</td>
                    `;
                    tbody.appendChild(tr);
                });
                
                // In-progress items
                allMods.filter(m => inProgressModules.has(m.id)).forEach(m => {
                    const quizUrl = m.url ? m.url : `quiz.html?module=${encodeURIComponent(m.id)}`;
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${m.name}</strong></td>
                        <td><span class="pill pill-warning">In Progress</span></td>
                        <td><a href="${quizUrl}">Resume →</a></td>
                    `;
                    tbody.appendChild(tr);
                });
                
            } catch {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="3">
                            <div class="results-empty">
                                <p>Failed to load results. Please refresh the page.</p>
                            </div>
                        </td>
                    </tr>
                `;
                loadModules();
            }
        }

        // ── Show Continue Card ──
        function showContinueCard(module, progress) {
            const section = document.getElementById('continueSection');
            const card = document.getElementById('continueCard');
            const quizUrl = module.url ? module.url : `quiz.html?module=${encodeURIComponent(module.id)}`;
            
            const answered = progress.filter(a => a !== null).length;
            const total = progress.length;
            const percentage = Math.round((answered / total) * 100);
            
            card.innerHTML = `
                <div class="continue-info">
                    <h3>${module.name}</h3>
                    <p>${module.desc}</p>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${percentage}%"></div>
                    </div>
                    <div class="progress-text">${answered} of ${total} questions answered</div>
                </div>
                <a href="${quizUrl}" class="btn btn-primary btn-lg">Resume →</a>
            `;
            
            section.style.display = 'block';
        }

        loadResults();
    </script>
</body>
</html>
